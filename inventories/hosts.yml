---

all:

  hosts:

    # Put the hosts here under the 'hosts' section










  # DO NOT MODIFY BELOW THIS LINE
  # THE GROUPS / VARS DEFINED HERE ARE FOR THE site.yml PLAYBOOK
  children:

    os_redhat_8:
      vars:
        ansible_python_interpreter: '/usr/libexec/platform-python'

    os_redhat_9:
      vars:
        ansible_python_interpreter: '/usr/bin/python3.9'

    local:
      vars:
        ansible_connection: local
        ansible_python_interpreter: "{{ ansible_playbook_python }}"

  vars:

    ansible_user: cloud-user

    # Use either url or pubkey dictionary values.
    # url - point to a FQDN where the ansible.posix.authorized_keys module can grab it
    # pubkey - contents of the public ssh key
    ssh_keys:
      - url: https://github.com/demonpig.keys
